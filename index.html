<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Pro Profile - Instant 'About Me' Bios</title>
    <meta name="description" content="Generate professional 'About Me' sections for LinkedIn, resumes, and portfolios using AI.">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        /* Custom styles for simplicity and dark mode feel */
        body { background-color: #1a202c; color: #e2e8f0; font-family: 'Inter', sans-serif; }
        .container { max-width: 768px; margin: 0 auto; padding: 2rem; }
        input[type="text"], textarea { background-color: #2d3748; border-color: #4a5568; color: #e2e8f0; }
        button { background-color: #63b3ed; color: #1a202c; transition: background-color 0.2s; }
        button:hover { background-color: #4299e1; }
        .output-box { background-color: #2d3748; border-color: #4a5568; }
        h1 { color: #e2e8f0; }
        label { color: #cbd5e0; }
    </style>
</head>
<body>
    <div class="container min-h-screen flex flex-col justify-center items-center py-10">
        <h1 class="text-4xl font-bold mb-6 text-center">AI Pro Profile</h1>
        <p class="text-xl text-gray-400 mb-8 text-center">Craft your perfect 'About Me' with AI, instantly.</p>

        <div class="w-full bg-gray-800 p-8 rounded-lg shadow-xl">
            <label for="keywords" class="block text-lg font-medium mb-2">Keywords (skills, industry, role, achievements):</label>
            <textarea id="keywords" rows="4" class="w-full p-3 border border-gray-600 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-400 mb-4" placeholder="e.g., Software Engineer, Python, AWS, Team Lead, Successfully launched product X, Finance Analyst"></textarea>

            <div class="mb-6">
                <label class="block text-lg font-medium mb-2">Select Profile Type:</label>
                <div class="flex flex-wrap gap-4">
                    <label class="inline-flex items-center"><input type="radio" name="profileType" value="linkedin" class="form-radio text-blue-500" checked><span class="ml-2">LinkedIn</span></label>
                    <label class="inline-flex items-center"><input type="radio" name="profileType" value="resume" class="form-radio text-blue-500"><span class="ml-2">Resume Summary</span></label>
                    <label class="inline-flex items-center"><input type="radio" name="profileType" value="portfolio" class="form-radio text-blue-500"><span class="ml-2">Portfolio Bio</span></label>
                </div>
            </div>

            <button id="generateBtn" class="w-full py-3 rounded-md text-lg font-semibold hover:bg-blue-600 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:ring-opacity-75">Generate 🚀</button>

            <div id="output" class="mt-8 p-4 border border-gray-600 rounded-md output-box hidden">
                <p class="text-lg font-medium mb-2">Your AI-Generated 'About Me':</p>
                <textarea id="generatedText" rows="6" class="w-full p-3 bg-transparent resize-none focus:outline-none" readonly></textarea>
                <button id="copyBtn" class="mt-4 w-full py-2 bg-gray-700 text-gray-200 rounded-md hover:bg-gray-600 transition-colors hidden">Copy to Clipboard</button>
            </div>

            <p id="loadingText" class="text-center text-blue-400 mt-4 hidden">Generating...</p>
            <p id="errorText" class="text-center text-red-400 mt-4 hidden">Error generating profile. Please try again.</p>
        </div>
    </div>

    <script src="https://js.stripe.com/v3/"></script>
    <script>
        const generateBtn = document.getElementById('generateBtn');
        const copyBtn = document.getElementById('copyBtn');
        const keywordsInput = document.getElementById('keywords');
        const generatedTextarea = document.getElementById('generatedText');
        const outputDiv = document.getElementById('output');
        const loadingText = document.getElementById('loadingText');
        const errorText = document.getElementById('errorText');
        const stripe = Stripe('your_publishable_key'); // Replace with your Stripe publishable key

        generateBtn.addEventListener('click', async () => {
            const keywords = keywordsInput.value.trim();
            const profileType = document.querySelector('input[name="profileType"]:checked').value;

            if (!keywords) {
                alert('Please enter some keywords!');
                return;
            }

            loadingText.classList.remove('hidden');
            outputDiv.classList.add('hidden');
            copyBtn.classList.add('hidden');
            errorText.classList.add('hidden');

            try {
                // In a real app, this would be a server-side call to process payment and then call OpenAI
                // For demo, we'll simulate a generation and payment
                const response = await fetch('/api/create-checkout-session', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ keywords, profileType })
                });

                const session = await response.json();

                if (session.error) {
                    errorText.textContent = session.error;
                    errorText.classList.remove('hidden');
                    loadingText.classList.add('hidden');
                    return;
                }

                const result = await stripe.redirectToCheckout({
                    sessionId: session.id
                });

                if (result.error) {
                    errorText.textContent = result.error.message;
                    errorText.classList.remove('hidden');
                    loadingText.classList.add('hidden');
                }

                // For a successful payment, you'd typically have a webhook call your API
                // that then generates the text and updates the user. 
                // For this front-end only demo, we'll simulate the generation after a "successful" checkout redirect.
                // In a real app, the server would send the generated text to the client after payment confirmation.
                
                // Simulate AI generation after a hypothetical payment success
                setTimeout(() => {
                    const dummyText = `As a highly motivated ${profileType} professional with expertise in ${keywords.split(',')[0].trim()} and a proven track record in ${keywords.split(',')[1].trim()}... (Generated by AI)`;
                    generatedTextarea.value = dummyText;
                    outputDiv.classList.remove('hidden');
                    copyBtn.classList.remove('hidden');
                    loadingText.classList.add('hidden');
                }, 2000); // Simulate API call delay

            } catch (error) {
                console.error('Error:', error);
                errorText.textContent = 'Failed to process. Please try again.';
                errorText.classList.remove('hidden');
                loadingText.classList.add('hidden');
            }
        });

        copyBtn.addEventListener('click', () => {
            generatedTextarea.select();
            document.execCommand('copy');
            alert('Copied to clipboard!');
        });
    </script>
</body>
</html>
